<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Platform — Resource Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --grey50:#F9FAFB;--grey100:#F2F4F6;--grey200:#E5E8EB;--grey300:#D1D6DB;--grey400:#B0B8C1;
    --grey500:#8B95A1;--grey600:#6B7684;--grey700:#4E5968;--grey800:#333D4B;--grey900:#191F28;
    --blue50:#E8F3FF;--blue500:#3182F6;--blue600:#1B64DA;--red50:#FDEDEE;--red500:#F04452;
    --green50:#E6F6EF;--green500:#03B26C;
    --t-okr:#3182F6;--t-ktlo:#F59F00;--t-ops:#12B886;--t-etc:#868E96;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    background:var(--grey100);color:var(--grey900);max-width:1200px;margin:0 auto;padding:0 24px 96px}
  a{text-decoration:none;color:inherit} button{font:inherit;cursor:pointer;border:none;background:none}

  .top{padding:38px 8px 16px}
  .top-line{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .top h1{font-size:26px;font-weight:800;letter-spacing:-.3px}
  .top .desc{margin-top:5px;font-size:14px;color:var(--grey600)} .top .desc b{color:var(--grey800);font-weight:600}
  .chips{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;height:33px;padding:0 13px;background:#fff;color:var(--grey700);font-size:13px;font-weight:600;border-radius:17px}
  .chip:hover{background:var(--grey200)} .chip::after{content:"↗";font-size:11px;color:var(--grey400)}
  .sync-btn{height:37px;padding:0 15px;border-radius:12px;background:var(--grey900);color:#fff;font-size:13px;font-weight:600;flex:none;display:inline-flex;align-items:center;gap:7px}
  .sync-btn:hover{background:var(--grey800)} .sync-btn.busy{opacity:.55;pointer-events:none}
  .pub-btn{height:37px;padding:0 15px;border-radius:12px;background:var(--blue500);color:#fff;font-size:13px;font-weight:600;flex:none;display:inline-flex;align-items:center;gap:7px}
  .pub-btn:hover{background:var(--blue600)} .pub-btn.busy{opacity:.55;pointer-events:none}
  .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:2px 8px 6px;margin-top:22px}
  .pfilter{display:flex;flex-wrap:wrap;gap:7px;padding:22px 8px 12px}
  .pchip{height:34px;padding:0 14px;border-radius:17px;background:#fff;color:var(--grey600);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  .pchip:hover{background:var(--grey50)} .pchip.on{background:var(--grey900);color:#fff}
  .pchip .pc{font-size:11px;font-weight:700;opacity:.65}
  .stat{background:#fff;border-radius:16px;padding:16px 20px 14px;cursor:pointer}
  .stat:hover{box-shadow:0 4px 14px rgba(25,31,40,.06)}
  .stat .lbl{font-size:13px;font-weight:600;color:var(--grey500)}
  .stat .num{margin-top:4px;font-size:25px;font-weight:800;letter-spacing:-.5px}
  .stat .num small{font-size:13px;font-weight:600;color:var(--grey500);margin-left:2px}
  .stat.signal .num{color:var(--blue600)}

  .tabs{display:flex;align-items:center;gap:2px;padding:14px 8px 0;margin-top:18px;position:sticky;top:0;z-index:6;background:var(--grey100)}
  .tabs button{font-size:15px;font-weight:600;color:var(--grey500);padding:11px 13px;position:relative}
  .tabs button:hover{color:var(--grey700)}
  .tabs button.on{color:var(--grey900);font-weight:700}
  .tabs button.on::after{content:"";position:absolute;left:11px;right:11px;bottom:0;height:2.5px;background:var(--grey900);border-radius:2px}
  .tabs button.tl.on::after{background:var(--blue500)}
  .tabs .count{font-size:12px;font-weight:700;color:var(--grey400);margin-left:3px}
  .tabs button.on .count{color:var(--blue500)}
  .tabs .sep{flex:1}

  /* Sync Check */
  #synccheck{margin:6px 0 4px}
  .sc-card{background:#fff;border-radius:16px;padding:2px 4px 8px}
  .sc-head{display:flex;align-items:baseline;gap:9px;padding:16px 16px 8px}
  .sc-head h2{font-size:16px;font-weight:800}
  .sc-head .sc-cnt{font-size:13px;font-weight:800;color:var(--red500)}
  .sc-empty{padding:8px 18px 14px;color:var(--grey500);font-size:13.5px}
  .sc-row{display:flex;align-items:center;gap:14px;padding:11px 16px;border-top:1px solid var(--grey100)}
  .sc-row:hover{background:var(--grey50)}
  .sc-left{flex:1;min-width:80px}
  .sc-sum{font-size:14.5px;font-weight:600;color:var(--grey800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sc-keys{display:flex;align-items:center;gap:6px;margin-top:5px}
  .scf{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .scf.mis{background:#FFF4E6;color:#E8590C} .scf.over{background:var(--red50);color:var(--red500)} .scf.eta{background:#F3F0FF;color:#7048E8} .scf.hc{background:#E6FCF5;color:#087F5B}
  .sc-pair{display:flex;gap:12px;flex:none}
  .sc-cell{width:162px;display:flex;align-items:center;gap:6px}
  .sc-lb{font-size:11px;font-weight:800;color:var(--grey400)}
  .sc-colhead{display:flex;align-items:center;gap:14px;padding:2px 16px 9px;font-size:11.5px;font-weight:600;color:var(--grey400)}
  .sc-colhead .sc-cell{justify-content:flex-start}
  .sc-assn{width:62px;flex:none;font-size:13px;color:var(--grey600);white-space:nowrap;overflow:hidden}
  .sc-due{width:98px;flex:none;font-size:12.5px;font-weight:600;color:var(--grey600);text-align:right}
  .sc-due.over{color:var(--red500);font-weight:700}

  /* list */
  .list-header{display:flex;align-items:baseline;padding:24px 10px 10px}
  .list-header h2{font-size:18px;font-weight:700} .list-header .cnt{font-size:13.5px;font-weight:600;color:var(--grey400);margin-left:8px}
  .card{background:#fff;border-radius:16px;margin:0 0 10px}
  .card.dragging{opacity:.4}
  .card.dropbefore{box-shadow:inset 0 3px 0 var(--blue500)} .card.dropafter{box-shadow:inset 0 -3px 0 var(--blue500)}
  .chead{display:flex;align-items:center;gap:10px;min-height:62px;padding:12px 16px;cursor:pointer;border-radius:16px}
  .chead:hover{background:var(--grey50)}
  .grip{width:16px;flex:none;text-align:center;color:var(--grey300);font-size:15px;cursor:grab;letter-spacing:-2px}
  .grip:active{cursor:grabbing} .card:hover .grip{color:var(--grey400)}
  .chev{width:16px;flex:none;text-align:center;color:var(--grey400);font-size:11px;transition:transform .18s}
  .card.open .chev{transform:rotate(90deg)} .chev.leaf{visibility:hidden}
  .kb{display:inline-flex;align-items:center;height:25px;padding:0 8px;border-radius:7px;font-size:12px;font-weight:800;white-space:nowrap;background:var(--grey100);color:var(--grey600);flex:none}
  .kb:hover{background:var(--grey200)} .kb.tm{background:var(--blue50);color:#5B8DEF;border:none} .kb.tm:hover{background:#D6E9FF}
  .ttl{flex:1;min-width:60px;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ttl .ty{font-size:12px;font-weight:600;color:var(--grey400);margin-left:7px}
  .dwrap{display:flex;gap:6px;flex:none;width:286px}
  .dfield{position:relative;width:140px;height:38px;border:1.5px solid var(--grey200);border-radius:9px;display:flex;align-items:center;gap:6px;padding:0 10px;background:#fff;cursor:pointer;overflow:hidden}
  .dfield:hover{border-color:var(--grey300)}
  .dtxt{flex:1;font-size:12.5px;color:var(--grey700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dtxt.ph{color:var(--grey400)}
  .dcal{font-size:13px;color:var(--grey400);flex:none;line-height:1}
  .dhide{position:absolute;inset:0;width:100%;height:100%;margin:0;padding:0;opacity:0;cursor:pointer;border:none}
  .dfield.ro{cursor:default;background:var(--grey50);border-color:transparent}
  .dfield.ro .dtxt.ph{color:var(--grey300)}
  .stbadge{display:inline-flex;align-items:center;justify-content:center;flex:none;width:134px;height:30px;border-radius:8px;font-size:12px;font-weight:700;background:var(--grey100);color:var(--grey600)}
  .stbadge.prog{background:var(--blue50);color:var(--blue600)} .stbadge.done{background:var(--green50);color:var(--green500)}
  .stbadge.lnk{text-decoration:none;position:relative} .stbadge.lnk::after{content:"↗";font-size:9px;position:absolute;right:6px;top:6px;opacity:.5}
  .assn{width:62px;flex:none;text-align:left;font-size:13px;font-weight:500;color:var(--grey600);white-space:nowrap;overflow:hidden}
  .assn.none{color:var(--red500);font-weight:600}
  .stsel{appearance:none;-webkit-appearance:none;flex:none;width:134px;height:30px;padding:0 24px 0 11px;border-radius:8px;border:1px solid var(--grey200);font-size:12px;font-weight:700;font-family:inherit;background-color:var(--grey100);color:var(--grey600);cursor:pointer;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="8" height="5"><path d="M0 0l4 5 4-5z" fill="%238B95A1"/></svg>');background-repeat:no-repeat;background-position:right 9px center;text-overflow:ellipsis;white-space:nowrap}
  .stsel.prog{background-color:var(--blue50);color:var(--blue600)} .stsel.done{background-color:var(--green50);color:var(--green500)} .stsel.saving{opacity:.45;pointer-events:none}
  .addbtn{width:30px;height:30px;flex:none;border-radius:9px;background:var(--grey100);color:var(--grey600);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .addbtn:hover{background:var(--blue50);color:var(--blue600)}
  .cbody{display:none;border-top:1px solid var(--grey100);padding:4px 0} .card.open .cbody{display:block}
  .crow{display:flex;align-items:center;gap:10px;min-height:52px;padding:8px 16px 8px 44px} .crow:hover{background:var(--grey50)} .crow.gr{padding-left:70px}
  .crow .tree{color:var(--grey300);font-size:12px;flex:none}
  .crow .ct{flex:1;min-width:40px;font-size:14px;font-weight:500;color:var(--grey800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow .ct .ty{font-size:11px;font-weight:600;color:var(--grey400);margin-left:6px}
  .empty{padding:52px;text-align:center;color:var(--grey400);font-size:14px;background:#fff;border-radius:16px}

  /* timeline (요약과 리스트 사이 고정) */
  #timeline{margin:24px 0 28px}
  .tlbar{display:flex;align-items:center;gap:14px;padding:6px 12px 12px;font-size:13.5px;color:var(--grey500)}
  .tlbar b{color:var(--grey900);font-weight:800} .tlbar .warn{color:var(--red500);font-weight:700}
  .gwrap{background:#fff;border-radius:16px;overflow:auto;max-height:460px}
  .gantt{position:relative;width:max-content;min-width:100%}
  .ghead{display:flex;height:38px;border-bottom:1px solid var(--grey100);position:sticky;top:0;background:#fff;z-index:4}
  .grow{display:flex;border-bottom:1px solid var(--grey100)} .grow:last-child{border-bottom:none}
  .gname{width:150px;flex:none;position:sticky;left:0;z-index:3;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:13.5px;font-weight:700;color:var(--grey800);border-right:1px solid var(--grey100)}
  .ghead .gname{background:var(--grey50);font-size:12px;font-weight:600;color:var(--grey500)}
  .gname .md{font-size:11px;font-weight:700;color:var(--grey400)}
  .gtrack{position:relative;flex:none;min-height:48px}
  .ghead .gtrack{min-height:38px}
  .wk{position:absolute;top:0;bottom:0;border-left:1px solid var(--grey100)}
  .wk.mon{border-left:1px solid var(--grey200)}
  .wlab{position:absolute;top:12px;font-size:11.5px;font-weight:600;color:var(--grey400);white-space:nowrap;padding-left:6px}
  .wlab.mon{color:var(--grey700);font-weight:700}
  .bar{position:absolute;height:28px;border-radius:7px;display:flex;align-items:center;gap:6px;padding:0 8px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;z-index:1}
  .bar:hover{filter:brightness(.93)} .bar .bd{margin-left:auto;font-size:11px;font-weight:700;opacity:.85;flex:none}
  .bar.open-start{border-top-left-radius:0;border-bottom-left-radius:0;-webkit-mask-image:linear-gradient(90deg,transparent,#000 18px)}
  .tray{background:#fff;border-radius:16px;margin-top:14px;padding:16px 18px}
  .tray h3{font-size:14px;font-weight:700;color:var(--grey700)} .tray .sub{font-size:12.5px;color:var(--grey400);margin:3px 0 12px}
  .tchip{display:inline-flex;align-items:center;gap:8px;margin:0 8px 8px 0;padding:8px 12px;border-radius:11px;background:var(--grey50);cursor:pointer}
  .tchip:hover{background:var(--blue50)} .tchip .k{font-size:11.5px;font-weight:800;color:var(--grey600)}
  .tchip .s{font-size:12.5px;color:var(--grey700);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tchip .w{font-size:11px;color:var(--grey400)} .tchip .set{font-size:11px;font-weight:700;color:var(--blue500)}

  footer{padding:34px 10px 0;font-size:12.5px;color:var(--grey400);line-height:1.8} footer b{color:var(--grey600);font-weight:600}

  dialog{border:none;border-radius:20px;padding:0;width:92%;max-width:440px;box-shadow:0 16px 48px rgba(25,31,40,.2)}
  dialog::backdrop{background:rgba(25,31,40,.5)}
  .dlg{padding:24px 24px 22px} .dlg h2{font-size:19px;font-weight:700}
  .dlg .under{margin-top:5px;font-size:13.5px;color:var(--grey500)} .dlg .under b{color:var(--blue600);font-weight:700}
  .fld{margin-top:15px} .fld label{display:block;font-size:12.5px;font-weight:600;color:var(--grey500);margin-bottom:6px}
  .fld input,.fld select{width:100%;height:46px;border:1.5px solid var(--grey200);border-radius:12px;padding:0 14px;font:inherit;font-size:14.5px;background:#fff}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--blue500)}
  .dlg-actions{display:flex;gap:8px;margin-top:20px}
  .btn{flex:1;height:47px;border-radius:12px;font-size:15px;font-weight:700}
  .btn.pri{background:var(--blue500);color:#fff}.btn.pri:hover{background:var(--blue600)}.btn.pri:disabled{opacity:.5}
  .btn.sec{background:var(--grey100);color:var(--grey700)}
  #toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(16px);background:var(--grey900);color:#fff;font-size:14px;font-weight:600;padding:12px 22px;border-radius:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)} #toast.err{background:var(--red500)}
</style>
</head>
<body>

<div class="top">
  <div class="top-line">
    <div><h1>Partner Platform</h1>
      <div class="desc">OKR · KTLO · 운영효율화 리소스 트래커 — 데이터 기준 <b id="updated"></b> <span id="mode" style="font-size:12px;color:var(--grey400)"></span></div>
    </div>
    <div style="display:flex;gap:8px;flex:none">
      <button class="sync-btn" id="syncBtn" onclick="doSync()">동기화</button>
      <button class="pub-btn" id="pubBtn" onclick="doPublish()">🔗 공유 링크 반영</button>
    </div>
  </div>
  <div class="chips">
    <a class="chip" id="lnk-okr" target="_blank">OKR 보드</a>
    <a class="chip" id="lnk-ktlo" target="_blank">KTLO 보드</a>
    <a class="chip" id="lnk-plan" target="_blank">ETR 요청 플랜</a>
  </div>
</div>

<div class="pfilter" id="pfilter"></div>

<div id="timeline"></div>

<div id="synccheck"></div>

<div class="tabs" id="tabs">
  <button data-t="all" class="on">전체</button>
  <button data-t="okr">OKR<span class="count" id="c-okr"></span></button>
  <button data-t="ktlo">KTLO<span class="count" id="c-ktlo"></span></button>
  <button data-t="ops">운영효율화<span class="count" id="c-ops"></span></button>
  <button data-t="etc">기타<span class="count" id="c-etc"></span></button>
</div>

<main id="list"></main>

<footer>
  <p><b>규칙</b> — TM 티켓 ↔ Epic 반드시 연결 · Initiative는 팀 내부 관리용 그루핑 · 기획/협의 작업은 Epic 하위 Task</p>
  <p>카드 우측 날짜칸 = 시작/종료(→Jira 저장, 비우면 없음 유지) · 타임라인 탭 = 담당자별 일정 바 · 상태·[＋]·동기화 실시간</p>
</footer>

<dialog id="newDlg">
  <div class="dlg">
    <h2>하위 과제 만들기</h2>
    <div class="under"><b id="dlg-parent"></b> 하위로 생성돼요</div>
    <div class="fld"><label>타이틀</label><input id="f-title" placeholder="과제 제목을 입력하세요"></div>
    <div class="fld"><label>이슈 타입</label><select id="f-type"><option>Task</option><option>Product</option><option>Design</option><option>Bug</option></select></div>
    <div class="fld"><label>담당자</label><select id="f-assn"></select></div>
    <div class="dlg-actions"><button class="btn sec" onclick="newDlg.close()">취소</button><button class="btn pri" id="f-submit" onclick="submitCreate()">만들기</button></div>
  </div>
</dialog>

<dialog id="dateDlg">
  <div class="dlg">
    <h2>일정 설정</h2>
    <div class="under"><b id="d-key"></b> <span id="d-sum" style="color:var(--grey600)"></span></div>
    <div style="display:flex;gap:10px">
      <div class="fld" style="flex:1"><label>시작일</label><input type="date" id="d-start"></div>
      <div class="fld" style="flex:1"><label>종료일</label><input type="date" id="d-due"></div>
    </div>
    <div class="dlg-actions"><button class="btn sec" onclick="dateDlg.close()">취소</button><button class="btn pri" id="d-submit" onclick="submitDates()">저장</button></div>
  </div>
</dialog>

<div id="toast"></div>

<script>
const TRACKS={okr:"OKR",ktlo:"KTLO",ops:"운영효율화",etc:"기타 · 백로그"};
const TCOLOR={okr:"var(--t-okr)",ktlo:"var(--t-ktlo)",ops:"var(--t-ops)",etc:"var(--t-etc)"};
const DAY=864e5, PXD=13;
let DATA=null,CONF=null,cur="all",curPerson=null,ORDER={},drag=null,READONLY=false;
const openSet=new Set(); let dlgParent=null,dateKey=null;
const newDlg=document.getElementById("newDlg"),dateDlg=document.getElementById("dateDlg");
const esc=s=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

Promise.all([
  fetch("data.json?t="+Date.now()).then(r=>r.json()),
  fetch("/api/config").then(r=>r.ok?r.json():null).catch(()=>null),
  fetch("order.json?t="+Date.now()).then(r=>r.ok?r.json():{}).catch(()=>({}))
]).then(([d,c,o])=>{
  DATA=d; ORDER=o||{};
  if(c){ CONF=c; } else { READONLY=true; CONF={mode:"readonly", assignees:deriveAssignees(d)}; }
  init(); if(!READONLY) autoSync();
});
function deriveAssignees(d){
  const seen=[]; for(const i of d.items){ if(i.assignee && !seen.includes(i.assignee)) seen.push(i.assignee); }
  return seen.map(n=>({name:n,id:""}));
}

function init(){
  document.getElementById("updated").textContent=DATA.updatedAt;
  document.getElementById("mode").textContent=CONF.mode==="readonly"?"· 읽기 전용":CONF.mode==="direct"?"· 직접연동":"· 브리지 모드";
  if(READONLY){ document.getElementById("syncBtn").style.display="none"; document.getElementById("pubBtn").style.display="none"; }
  document.getElementById("lnk-okr").href=DATA.boards.okr;
  document.getElementById("lnk-ktlo").href=DATA.boards.ktlo;
  document.getElementById("lnk-plan").href=DATA.boards.plan;
  document.getElementById("f-assn").innerHTML='<option value="">미지정</option>'+CONF.assignees.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join("");
  refreshCounts();renderStats();render();
  document.getElementById("tabs").addEventListener("click",e=>{const b=e.target.closest("button[data-t]");if(!b)return;

/* ── 티켓 Sync Check (TM ↔ Epic 상태 불일치 · 기한초과 미착수) ── */
function renderSyncCheck(){
  const el=document.getElementById("synccheck");
  const n=new Date(), ts=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
  const rows=[];
  for(const i of DATA.items){
    if(!i.tm || !matchPerson(i)) continue;
    const mismatch = i.tmStatusCat && i.statusCat && i.tmStatusCat!==i.statusCat;
    const overdue  = i.due && i.due<ts && i.statusCat==="To Do";
    const noeta    = !i.tmDue;   // TM 티켓에 ETA(due) 없음
    // suggest 단계를 벗어난(준비중 이상 = In Progress) TM인데 Health Check 또는 분기 KR 달성 미입력
    // Backlog·SUGGESTED(To Do)·HOLD·Done 은 대상 아님
    const beyond   = i.tmStatusCat==="In Progress" && !/hold/i.test(i.tmStatus||"");
    const healthck = beyond && (i.tmHealth===false || i.tmKr===false);
    if(mismatch||overdue||noeta||healthck) rows.push({i,mismatch,overdue,noeta,healthck});
  }
  let body;
  if(!rows.length){
    body=`<div class="sc-empty">✅ 이상 없음 — 연결된 TM↔Epic 상태가 일치하고, 기한 초과·미착수 건도 없어요</div>`;
  }else{
    const colhead=`<div class="sc-colhead">
      <div class="sc-left">과제 · 연결 티켓 · 사유</div>
      <div class="sc-pair"><div class="sc-cell">TM 상태</div><div class="sc-cell">Epic 상태</div></div>
      <span class="sc-assn">담당자</span>
      <span class="sc-due">마감일</span>
    </div>`;
    body=colhead+rows.map(({i,mismatch,overdue,noeta,healthck})=>`<div class="sc-row">
      <div class="sc-left">
        <div class="sc-sum" title="${esc(i.summary)}">${esc(i.summary)}</div>
        <div class="sc-keys">
          <a class="kb tm" target="_blank" href="${link(i.tm)}">${esc(i.tm)}</a>
          <a class="kb" target="_blank" href="${link(i.key)}">${esc(i.key)}</a>
          ${mismatch?'<span class="scf mis">상태 불일치</span>':''}${overdue?'<span class="scf over">기한초과·미착수</span>':''}${noeta?'<span class="scf eta">ETA 체크</span>':''}${healthck?'<span class="scf hc" title="Health Check 또는 분기 KR 달성 미입력">헬스체크 필요</span>':''}
        </div>
      </div>
      <div class="sc-pair">
        <div class="sc-cell"><span class="sc-lb">TM</span><a class="stbadge ${i.tmStatusCat==='In Progress'?'prog':i.tmStatusCat==='Done'?'done':''} lnk" target="_blank" href="${link(i.tm)}" title="TM 상태는 Jira에서 변경 (필수 필드 다수)">${esc(i.tmStatus||'—')}</a></div>
        <div class="sc-cell"><span class="sc-lb">Epic</span>${stSel(i.key,i.status,i.statusCat)}</div>
      </div>
      <span class="sc-assn">${esc(i.assignee||'미지정')}</span>
      <span class="sc-due ${overdue?'over':''}">${i.due||'—'}</span>
    </div>`).join("");
  }
  el.innerHTML=`<div class="sc-card"><div class="sc-head"><h2>티켓 Sync Check!</h2><span class="sc-cnt">${rows.length?rows.length+'건':''}</span></div>${body}</div>`;
}

function card(root,kids,items){

function crow(i,gr){

    <a class="kb" target="_blank" href="${link(i.key)}">${esc(i.key)}</a>

/* ── drag & drop 우선순위 ── */
function rankCmp(a,b){const ra=ORDER[a.key],rb=ORDER[b.key];
  if(ra!=null&&rb!=null)return ra-rb; if(ra!=null)return -1; if(rb!=null)return 1; return 0;}
function saveOrder(){fetch("/api/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({order:ORDER})}).catch(()=>{});}
function topKeysOf(track){const items=DATA.items.filter(i=>i.track===track);const keys=new Set(items.map(i=>i.key));
  return items.filter(i=>!i.parent||!keys.has(i.parent)).sort(rankCmp).map(i=>i.key);}
function onDragStart(e,key,track){
  if(e.target.closest("select,input,button,a,.dfield")){e.preventDefault();return;}
  drag={key,track};e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",key);}catch(_){}
  document.getElementById("card-"+key)?.classList.add("dragging");}
function onDragOver(e,overKey){if(!drag)return;const ov=DATA.items.find(i=>i.key===overKey);
  if(!ov||ov.track!==drag.track||overKey===drag.key)return;e.preventDefault();
  const el=e.currentTarget,r=el.getBoundingClientRect(),after=e.clientY>r.top+r.height/2;
  el.classList.toggle("dropafter",after);el.classList.toggle("dropbefore",!after);}
function onDragLeave(e){e.currentTarget.classList.remove("dropbefore","dropafter");}
function onDrop(e,overKey){if(!drag)return;const el=e.currentTarget,after=el.classList.contains("dropafter");
  el.classList.remove("dropbefore","dropafter");e.preventDefault();
  const ov=DATA.items.find(i=>i.key===overKey);
  if(!ov||ov.track!==drag.track||overKey===drag.key){drag=null;return;}
  let keys=topKeysOf(drag.track).filter(k=>k!==drag.key);let idx=keys.indexOf(overKey);if(idx<0)idx=keys.length;
  keys.splice(after?idx+1:idx,0,drag.key);keys.forEach((k,i)=>ORDER[k]=i);
  saveOrder();drag=null;render();}
function onDragEnd(e){document.querySelectorAll(".card").forEach(c=>c.classList.remove("dragging","dropbefore","dropafter"));drag=null;}

/* ── TIMELINE ── */
function d2t(s){const[y,m,d]=s.split("-").map(Number);return Date.UTC(y,m-1,d);}
function monday(t){const d=new Date(t);return t-((d.getUTCDay()+6)%7)*DAY;}
function todayT(){const n=new Date();return Date.UTC(n.getFullYear(),n.getMonth(),n.getDate());}

const BH=28,BG=6,PAD=7;
function renderTimeline(){
  const el=document.getElementById("timeline");
  const epics=DATA.items.filter(i=>(i.type==="Epic"||i.type==="Initiative")&&matchPerson(i));
  const dated=epics.filter(i=>i.start||i.due), undated=epics.length-dated.length;
  if(!dated.length){ el.innerHTML=`<div class="tlbar">타임라인 (Epic 기준) · <span class="warn">일정 있는 Epic 없음 (미정 ${undated})</span> — 아래 리스트에서 Epic에 시작/종료일을 넣으면 여기에 표시돼요</div>`; return; }

  let lo=Infinity,hi=-Infinity;
  for(const i of dated){ if(i.start){const t=d2t(i.start);lo=Math.min(lo,t);hi=Math.max(hi,t);} if(i.due){const t=d2t(i.due);lo=Math.min(lo,t);hi=Math.max(hi,t);} }
  const winS=monday(lo-3*DAY), winE=monday(hi+7*DAY)+7*DAY;
  const laneW=Math.round((winE-winS)/DAY*PXD);
  const X=t=>Math.round((t-winS)/DAY*PXD);

  let grid="",labels="";
  for(let t=winS;t<winE;t+=7*DAY){const d=new Date(t);const mon=d.getUTCDate()<=7;
    grid+=`<div class="wk ${mon?'mon':''}" style="left:${X(t)}px"></div>`;
    labels+=`<div class="wlab ${mon?'mon':''}" style="left:${X(t)}px">${mon?(d.getUTCMonth()+1)+'월 ':''}${d.getUTCDate()}일</div>`;}

  const order=[...CONF.assignees.map(a=>a.name),"미지정"];
  const groups={};for(const i of dated){const k=i.assignee||"미지정";(groups[k]=groups[k]||[]).push(i);}
  const names=Object.keys(groups).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});

  let lanes="";
  for(const nm of names){
    const segs=groups[nm].map(i=>{
      let s=i.start?d2t(i.start):null, e=i.due?d2t(i.due):null, openStart=false;
      if(s&&!e)e=s+4*DAY; else if(e&&!s){s=e-4*DAY;openStart=true;}
      return {i,s,e,openStart};
    }).sort((a,b)=>a.s-b.s);
    const rowEnd=[];                                   // 세로 스택 패킹
    for(const g of segs){ let r=0; while(r<rowEnd.length && rowEnd[r]>g.s) r++; g.row=r; rowEnd[r]=g.e; }
    const nRows=Math.max(1,rowEnd.length), laneH=PAD*2+nRows*BH+(nRows-1)*BG;
    let bars="";
    for(const g of segs){
      const {i}=g, left=X(g.s), w=Math.max(X(g.e)-X(g.s)+PXD,PXD*3), top=PAD+g.row*(BH+BG);
      const dl=(i.start&&i.due)?`<span class="bd">${Math.round((d2t(i.due)-d2t(i.start))/DAY)+1}d</span>`:"";
      bars+=`<div class="bar ${g.openStart?'open-start':''}" style="left:${left}px;top:${top}px;width:${w}px;background:${TCOLOR[i.track]}" title="${esc(i.key)} · ${esc(i.summary)}&#10;${i.start||'—'} ~ ${i.due||'—'}" onclick="openDates('${i.key}')">${esc(i.summary)}${dl}</div>`;
    }
    lanes+=`<div class="grow"><div class="gname" style="height:${laneH}px"><span>${esc(nm)}</span><span class="md">${groups[nm].length}건</span></div><div class="gtrack" style="width:${laneW}px;height:${laneH}px">${grid}${bars}</div></div>`;
  }

  const prev=el.querySelector(".gwrap"), prevScroll=prev?prev.scrollLeft:null;
  el.innerHTML=`
    <div class="tlbar">타임라인 <span style="color:var(--grey400);font-weight:600">(Epic 기준)</span> · 담당자 <b>${names.length}</b> · 일정 <b>${dated.length}</b>개 Epic${undated?` · <span class="warn">미정 ${undated}</span>`:""}</div>
    <div class="gwrap"><div class="gantt">
      <div class="ghead"><div class="gname">담당자</div><div class="gtrack" style="width:${laneW}px">${grid}${labels}</div></div>
      ${lanes}
    </div></div>`;
  const gw=el.querySelector(".gwrap"), GNAME=150;
  requestAnimationFrame(()=>{
    if(!gw)return;
    if(prevScroll!=null){ gw.scrollLeft=prevScroll; }              // 재렌더: 보던 위치 유지
    else{ gw.scrollLeft=Math.max(0, GNAME+X(todayT())-gw.clientWidth/2); } // 최초: 오늘 중앙
  });
}

/* ── sync ── */
async function doSync(auto){
  const b=document.getElementById("syncBtn");b.classList.add("busy");b.innerHTML=`<span class="spin"></span>동기화 중`;
  try{const r=await fetch("/api/sync",{method:"POST"});const d=await r.json();if(d.error)throw new Error(d.error);
    const before=new Set(DATA.items.map(i=>i.key));DATA=d;const after=new Set(d.items.map(i=>i.key));
    const rm=[...before].filter(k=>!after.has(k)).length, ad=[...after].filter(k=>!before.has(k)).length;
    document.getElementById("updated").textContent=d.updatedAt;refreshCounts();renderStats();render();
    if(!auto||rm||ad)toast(`동기화 완료 — 신규 ${ad} · 제거 ${rm}`);
  }catch(e){if(!auto)toast("동기화 실패: "+e.message,true);}
  b.classList.remove("busy");b.textContent="동기화";
}
function autoSync(){doSync(true);}

/* ── status ── */
async function loadTrans(sel){if(sel.dataset.loaded)return;sel.dataset.loaded="1";const cu=sel.dataset.cur;
  try{const r=await fetch("/api/transitions?key="+sel.dataset.key);const ts=await r.json();if(ts.error)throw 0;
    const seen=new Set([cu]),opts=[];                       // 같은 상태명(중복 Done 등) 하나로
    for(const t of ts){ if(seen.has(t.name))continue; seen.add(t.name); opts.push(t); }
    sel.innerHTML=`<option value="">${esc(cu)}</option>`+opts.map(t=>`<option value="${t.id}" data-cat="${t.cat}">${esc(t.name)}</option>`).join("");
  }catch(e){sel.innerHTML=`<option>${esc(cu)}</option><option disabled>전이 조회 실패</option>`;}}
async function changeStatus(sel){const tid=sel.value;if(!tid)return;
  const name=sel.options[sel.selectedIndex].text, cat=sel.options[sel.selectedIndex].dataset.cat||"";sel.classList.add("saving");
  try{const r=await fetch("/api/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:sel.dataset.key,transitionId:tid})});
    const d=await r.json();if(d.error)throw new Error(d.error);
    const key=sel.dataset.key;
    if(key.startsWith("TM-")){ for(const it of DATA.items) if(it.tm===key){it.tmStatus=name;it.tmStatusCat=cat||it.tmStatusCat;} }
    else { const it=DATA.items.find(i=>i.key===key); if(it){it.status=name;it.statusCat=cat||it.statusCat;} }
    renderStats();render();toast(`${key} → ${name} 반영`);
  }catch(e){toast("상태 변경 실패: "+e.message,true);render();}}

/* ── create ── */
function openCreate(parent){dlgParent=parent;const p=DATA.items.find(i=>i.key===parent);
  document.getElementById("dlg-parent").textContent=`${parent} · ${p?p.summary:""}`;document.getElementById("f-title").value="";newDlg.showModal();}
async function submitCreate(){
  const title=document.getElementById("f-title").value.trim();if(!title)return toast("타이틀을 입력하세요",true);
  const type=document.getElementById("f-type").value, assn=document.getElementById("f-assn"), btn=document.getElementById("f-submit");
  btn.disabled=true;btn.textContent="생성 중…";
  try{const r=await fetch("/api/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({parent:dlgParent,summary:title,type,assigneeId:assn.value||null})});
    const d=await r.json();if(d.error)throw new Error(d.error);const p=DATA.items.find(i=>i.key===dlgParent);
    DATA.items.push({key:d.key,track:p?p.track:"etc",summary:title,type,status:"SUGGESTED",statusCat:"To Do",assignee:assn.value?assn.options[assn.selectedIndex].text:null,parent:dlgParent,tm:null,start:null,due:null,estMd:null});
    openSet.add(dlgParent);refreshCounts();renderStats();render();newDlg.close();toast(`${d.key} 생성 완료`);
  }catch(e){toast("생성 실패: "+e.message,true);}
  btn.disabled=false;btn.textContent="만들기";}

/* ── dates ── */
async function setDate(key,which,val){
  const body={key};body[which]=val||"";
  const it=DATA.items.find(i=>i.key===key);const prev=it?it[which]:null;
  if(it) it[which]=val||null;
  try{const r=await fetch("/api/dates",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();if(d.error)throw new Error(d.error);toast(`${key} ${which==='start'?'시작일':'종료일'} 저장`);
  }catch(e){if(it)it[which]=prev;render();toast("저장 실패: "+e.message,true);}
}
function openDates(key){if(READONLY)return;dateKey=key;const it=DATA.items.find(i=>i.key===key);
  document.getElementById("d-key").textContent=key;document.getElementById("d-sum").textContent=it?it.summary:"";
  document.getElementById("d-start").value=it.start||"";document.getElementById("d-due").value=it.due||"";dateDlg.showModal();}
async function submitDates(){
  const start=document.getElementById("d-start").value||"", due=document.getElementById("d-due").value||"";
  const btn=document.getElementById("d-submit");btn.disabled=true;btn.textContent="저장 중…";
  try{const r=await fetch("/api/dates",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:dateKey,start,due})});
    const d=await r.json();if(d.error)throw new Error(d.error);
    const it=DATA.items.find(i=>i.key===dateKey);if(it){it.start=start||null;it.due=due||null;}
    render();dateDlg.close();toast(`${dateKey} 일정 저장`);
  }catch(e){toast("일정 저장 실패: "+e.message,true);}
  btn.disabled=false;btn.textContent="저장";}

function toast(m,err){const t=document.getElementById("toast");t.textContent=m;t.className="show"+(err?" err":"");clearTimeout(t._h);t._h=setTimeout(()=>t.className="",3000);}
</script>
